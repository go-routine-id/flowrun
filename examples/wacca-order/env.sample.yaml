# Salin ke dev.yaml (gitignored) lalu isi — JANGAN commit token/host asli.
#
#   cp env.sample.yaml dev.yaml
#
base_url: "https://REPLACE-WITH-DEV-HOST"

# Bearer token per profil auth (lihat auth_profiles di flow.yaml).
tokens:
  customer: "REPLACE-JWT-CUSTOMER"
  owner: "REPLACE-JWT-OWNER" # JWT tenant/owner (org di claim, email-verified)

# Seed vars (uuid dari environment dev kamu).
vars:
  outlet_id: "REPLACE-UUID-OUTLET"
  item_id: "REPLACE-UUID-ITEM-LAYANAN"
  payment_method_id: "REPLACE-UUID-METODE-COD" # metode COD → e2e lunas
  # pay_mode: digital  # uncomment utk mode digital (n10 di-skip)
